<!DOCTYPE html>
<html>
<head>
    <title>VillageConnect AI</title>
    <style>
        body {
            font-family: Arial;
            background: linear-gradient(to right, #2c5364, #0f2027);
            display: flex;
            justify-content: center;
            padding-top: 50px;
        }

        .container {
            background: white;
            width: 500px;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0px 5px 20px rgba(0,0,0,0.3);
        }

        h2 {
            text-align: center;
        }

        .response {
            margin-top: 20px;
            padding: 10px;
            background: #f1f1f1;
            border-radius: 5px;
        }

        input {
            width: 75%;
            padding: 8px;
        }

        button {
            padding: 8px 12px;
            background: green;
            color: white;
            border: none;
            cursor: pointer;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>🌾 VillageConnect AI</h2>

    <form method="POST">
        <input type="text" name="message" placeholder="Ask about schemes, health, utilities..." required>
        <button type="submit">Ask</button>
    </form>

    {% for chat in chat_history %}
    <div style="margin-top:5px; padding:10px; background:#f1f1f1; border-radius:5px;">
         <strong>Bot:</strong> {{ chat.bot }}

         <div style="font-size:11px; color:gray; margin-top:5px;">
              Confidence: {{ chat.confidence }}
         </div>

         <span style="float:right; font-size:11px; color:gray; margin-left:10px;">
             {{ chat.time }}
         </span>
    </div>

    <div style="margin-top:5px; padding:10px; background:#f1f1f1; border-radius:5px;">
        <strong>Bot:</strong> {{ chat.bot }}
        <span style="float:right; font-size:11px; color:gray; margin-left:10px;">
            {{ chat.time }}
        </span>
    </div>
{% endfor %}

<a href="/clear">
    <button style="background-color:#c0392b; color:white; border:none; padding:8px 12px; margin-top:10px; cursor:pointer;">
        Clear Chat
    </button>
</a>

</div>

</body>
</html>
